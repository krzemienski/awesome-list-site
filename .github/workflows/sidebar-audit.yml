name: Sidebar Click Audit

on:
  push:
    branches: [main]
    paths:
      - "client/src/components/layout/new/**"
      - "client/src/pages/Category*.tsx"
      - "client/src/pages/SubCategory*.tsx"
      - "client/src/pages/SubSubCategory*.tsx"
      - "scripts/audit-sidebar*.mjs"
      - "scripts/audit-sidebar.sh"
      - ".github/workflows/sidebar-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "client/src/components/layout/new/**"
      - "client/src/pages/Category*.tsx"
      - "client/src/pages/SubCategory*.tsx"
      - "client/src/pages/SubSubCategory*.tsx"
      - "scripts/audit-sidebar*.mjs"
      - "scripts/audit-sidebar.sh"
      - ".github/workflows/sidebar-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "sidebar-audit-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  audit:
    name: Exhaustive sidebar click audit
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run sidebar audit
        env:
          BASE_URL: http://localhost:5000
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}
          NODE_ENV: development
        run: bash scripts/audit-sidebar.sh

      - name: Upload audit artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sidebar-audit-${{ github.run_id }}
          path: |
            _validation/sidebar/exhaustive.json
            _validation/sidebar/exhaustive.md
            _validation/sidebar/clicks/
            /tmp/audit-sidebar-dev.log
          if-no-files-found: ignore
          retention-days: 14
