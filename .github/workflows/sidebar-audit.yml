name: Sidebar Exhaustive Audit

on:
  pull_request:
    paths:
      - 'client/src/components/layout/new/AppSidebar.tsx'
      - 'client/src/pages/Category*'
      - 'client/src/pages/SubCategory*'
      - 'client/src/pages/SubSubCategory*'
      - 'scripts/audit-sidebar-exhaustive-clicks.mjs'
      - 'scripts/audit-sidebar.sh'
      - '.github/workflows/sidebar-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "sidebar-audit-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  sidebar-audit:
    name: Exhaustive sidebar click audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require seeded database secret
        run: |
          if [ -z "${{ secrets.TEST_DATABASE_URL }}" ]; then
            echo "::error::TEST_DATABASE_URL secret is not set. The sidebar audit walks the real category tree, so it needs a database seeded with the resource taxonomy (an empty DB renders an empty sidebar and the audit cannot run). Set the TEST_DATABASE_URL repo secret to a seeded Postgres connection string."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run exhaustive sidebar audit
        run: npm run audit:sidebar
        env:
          NODE_ENV: development
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          SESSION_SECRET: ci-sidebar-audit-secret
          READY_TIMEOUT_S: '120'

      - name: Upload audit artifacts (results + failing screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sidebar-audit
          path: _validation/sidebar/
          retention-days: 7
          if-no-files-found: warn
