    <script>
      // BUG-021 (run24): strip query params carrying obvious XSS payloads from
      // the address bar BEFORE any other boot script runs. The app never
      // renders raw query strings as HTML, but the payload sat in the URL bar
      // (shareable/copyable) and flowed into analytics page_path. Runs
      // pre-React via replaceState so no history entry keeps the payload.
      (function () {
        try {
          if (!location.search || location.search.length < 2) return;
          var XSS = /<\s*\/?\s*[a-z][^>]*>|javascript\s*:|\bon[a-z]+\s*=|data\s*:\s*text\/html/i;
          var params = new URLSearchParams(location.search);
          var dirty = false;
          var names = [];
          params.forEach(function (v, k) { names.push(k); });
          for (var i = 0; i < names.length; i++) {
            var k = names[i];
            var raw = k + '=' + (params.get(k) || '');
            var dec = raw;
            try { dec = decodeURIComponent(raw); } catch (_) {}
            if (XSS.test(raw) || XSS.test(dec)) {
              params.delete(k);
              dirty = true;
            }
          }
          if (dirty) {
            var qs = params.toString();
            history.replaceState(
              history.state,
              '',
              location.pathname + (qs ? '?' + qs : '') + location.hash
            );
          }
        } catch (e) {}
      })();
    </script>

    <script>
      (function () {
        try {
          var SYSTEMS = ['editorial', 'terminal', 'geist', 'brutalist', 'swiss'];
          var ACCENTS  = ['crimson', 'magenta', 'orange', 'amber', 'emerald', 'matrix', 'cyan', 'violet', 'lime', 'rose'];
          var sys = null, acc = null;
          try { sys = localStorage.getItem('ds-system'); } catch (_) {}
          try { acc = localStorage.getItem('ds-accent'); } catch (_) {}
          if (SYSTEMS.indexOf(sys) === -1) sys = 'editorial';
          if (ACCENTS.indexOf(acc)  === -1) acc = 'crimson';
          var root = document.documentElement;
          root.setAttribute('data-system', sys);
          root.setAttribute('data-accent', acc);
          root.classList.add('dark');
          root.style.backgroundColor = '#000';

          // I1 — font override: read ds-font-override from localStorage and
          // apply --font-sans pre-paint on EVERY route, so the override
          // persists across hard reloads regardless of which page boots.
          // Must match FONT_OPTIONS in client/src/lib/font-options.ts (source of truth).
          // Drift is detected by scripts/verify-fixes.mjs V11.
          var FONT_STACKS = {
            'system':       '',
            'inter':        "'Inter', system-ui, sans-serif",
            'dm-sans':      "'DM Sans', system-ui, sans-serif",
            'source-sans':  "'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif",
            'ibm-plex':     "'IBM Plex Sans', system-ui, sans-serif",
            'jetbrains':    "'JetBrains Mono', ui-monospace, monospace"
          };
          var fnt = null;
          try { fnt = localStorage.getItem('ds-font-override'); } catch (_) {}
          if (fnt && FONT_STACKS[fnt]) {
            // Run22 BUG-015: body text uses --font-body (not --font-sans);
            // set both, matching applyFontOverride in font-options.ts.
            root.style.setProperty('--font-body', FONT_STACKS[fnt]);
            root.style.setProperty('--font-sans', FONT_STACKS[fnt]);
          }
        } catch (e) {}
      })();
    </script>

    <script>
      // BUG-001 (run19): kick off the awesome-list fetch before the JS bundle
      // is even parsed. fetchStaticAwesomeList() consumes this promise (one
      // shot) so warm loads don't serialize bundle-parse -> fetch. The catch
      // only silences unhandled-rejection noise; consumers handle errors.
      (function () {
        // Run22 BUG-008: the nav tree (~few KB) is needed by the chrome on
        // every page, so always early-fetch it. The full 2.7MB corpus is only
        // early-fetched on routes whose content renders resource listings —
        // keep this route list in sync with needsCorpusRoute() in
        // client/src/lib/static-data.ts.
        try {
          var n = fetch('/api/awesome-list/nav', { credentials: 'same-origin' });
          window.__awesomeListNavEarlyFetch = n;
          n.catch(function () {});
        } catch (e) {}
        try {
          var pth = location.pathname;
          // Run23 R-06: '/' and '/categories' are nav-only now.
          // Run23 NB-010: '/recommendations' removed — anonymous visitors
          // never render the corpus there; the authed panel fetches it
          // lazily once auth resolves.
          var needsCorpus =
            pth === '/advanced' ||
            pth.indexOf('/category/') === 0 ||
            pth.indexOf('/subcategory/') === 0 ||
            pth.indexOf('/sub-subcategory/') === 0;
          if (needsCorpus) {
            var p = fetch('/api/awesome-list', { credentials: 'same-origin' });
            window.__awesomeListEarlyFetch = p;
            p.catch(function () {});
          }
        } catch (e) {}
        // Task 169: same trick for the auth check — /api/auth/user used to
        // wait for bundle-parse + React mount before firing, and header
        // state waited on it. useAuth() consumes this promise (one shot).
        try {
          var a = fetch('/api/auth/user', { credentials: 'include' });
          window.__authUserEarlyFetch = a;
          a.catch(function () {});
        } catch (e) {}
      })();
    </script>

    <script>
      (function () {
        try {
          var isDev = location.hostname.endsWith('.replit.dev') ||
                      location.hostname === 'localhost' ||
                      location.hostname.endsWith('.repl.co');
          if (!isDev) return;

          // Narrow regex: only match the specific Vite/HMR rejection
          // signatures that drive the overlay loop. Avoid bare "fetch" or
          // "vite" tokens so real app errors (incl. words like "invite"
          // or React Query fetch failures) still surface in dev consoles.
          var noisy = /(?:^|\b)(?:Load failed|Failed to fetch dynamically imported module|WebSocket (?:is closed|connection failed|error)|\[vite\]|vite-hmr|HMR connection lost)(?:\b|$)/i;
          var stackHit = /\/@vite\/client|\/node_modules\/vite\//;

          window.addEventListener('unhandledrejection', function (e) {
            var reason = e && e.reason;
            var msg = (reason && (reason.message || String(reason))) || '';
            var stack = (reason && reason.stack) || '';
            if (noisy.test(msg) || stackHit.test(stack)) e.preventDefault();
          });

          var kill = function (el) {
            try { el.parentNode && el.parentNode.removeChild(el); } catch (_) {}
          };
          var sweep = function () {
            document.querySelectorAll(
              'vite-error-overlay, vite-plugin-checker-error-overlay'
            ).forEach(kill);
          };

          if (document.body) sweep();
          new MutationObserver(function (muts) {
            for (var i = 0; i < muts.length; i++) {
              var added = muts[i].addedNodes;
              for (var j = 0; j < added.length; j++) {
                var n = added[j];
                if (n.nodeType === 1) {
                  var tag = n.tagName && n.tagName.toLowerCase();
                  if (tag === 'vite-error-overlay' ||
                      tag === 'vite-plugin-checker-error-overlay') {
                    kill(n);
                  }
                }
              }
            }
          }).observe(document.documentElement, { childList: true, subtree: true });
        } catch (e) {}
      })();
    </script>

    <!-- BUG-014: load the primary font stylesheet directly. The previous
         rel="preload" + inline onload="..." swap relied on an inline event
         handler, which a nonce-based CSP (no 'unsafe-inline') blocks — nonces
         do not cover inline event handlers. A plain stylesheet link needs no
         inline JS, works under strict CSP, and keeps display=swap for FOUT
         control. Same URL for all clients, so the old <noscript> duplicate is
         no longer needed. -->
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
    <script>
      (function () {
        // Run22 BUG-015: DM Sans + Source Sans 3 are offered by the font
        // picker (FONT_OPTIONS) but were never loaded — picking them fell
        // back to system-ui silently.
        var ALT_FONTS_URL = 'https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap';
        function loadAltFonts() {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = ALT_FONTS_URL;
          document.head.appendChild(link);
        }
        if (document.readyState === 'complete') {
          loadAltFonts();
        } else {
          window.addEventListener('load', loadAltFonts, { once: true });
        }
      })();
    </script>

    <script>
      // BUG-018 (run19): routes without server-injected content (admin,
      // noindex pages) used to show a blank black page until React mounted.
      // Paint a minimal skeleton ONLY when #root is empty — injected SSR
      // content (most public routes) already gives instant real content.
      // React's createRoot().render() replaces this on mount.
      (function () {
        try {
          var root = document.getElementById('root');
          if (!root || root.firstElementChild) return;
          root.innerHTML =
            '<div aria-hidden="true" style="min-height:100vh;background:#000;padding:40px 20px;max-width:960px;margin:0 auto">' +
            '<style>@keyframes bsk{0%{opacity:.35}50%{opacity:.7}100%{opacity:.35}}.bsk{background:#1a1a22;animation:bsk 1.4s ease-in-out infinite}</style>' +
            '<div class="bsk" style="height:2rem;width:60%;max-width:420px;margin-bottom:1rem"></div>' +
            '<div class="bsk" style="height:1rem;width:80%;max-width:640px;margin-bottom:2rem"></div>' +
            '<div class="bsk" style="height:8rem;width:100%;margin-bottom:1rem"></div>' +
            '<div class="bsk" style="height:8rem;width:100%;margin-bottom:1rem"></div>' +
            '<div class="bsk" style="height:8rem;width:100%"></div>' +
            '</div>';
        } catch (e) {}
      })();
    </script>
