<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <!--
      Default OG/Twitter tags below are the fallback shipped in the static
      bundle. At request time, server/og-middleware.ts rewrites the <head>
      with route-specific metadata (title/description/image/canonical) so
      social crawlers (Twitter, Facebook, Slack, iMessage, LinkedIn, etc.)
      see correct previews for every page on https://new.awesome.video.
    -->
    <title>Awesome Video — Curated video development resources</title>
    <meta name="description" content="The curated index of 2,600+ video development resources — players, encoders, codecs, streaming, AI, tools, and community." />
    <meta name="keywords" content="video development, ffmpeg, hls, dash, video players, encoders, codecs, streaming, video ai, awesome video" />
    <link rel="canonical" href="https://new.awesome.video/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Awesome Video" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://new.awesome.video/" />
    <meta property="og:title" content="Awesome Video — Curated video development resources" />
    <meta property="og:description" content="The curated index of 2,600+ video development resources — players, encoders, codecs, streaming, AI, tools, and community." />
    <meta property="og:image" content="https://new.awesome.video/og-image.png" />
    <meta property="og:image:secure_url" content="https://new.awesome.video/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Awesome Video — curated video development resources" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@awesome_video" />
    <meta name="twitter:title" content="Awesome Video — Curated video development resources" />
    <meta name="twitter:description" content="The curated index of 2,600+ video development resources — players, encoders, codecs, streaming, AI, tools, and community." />
    <meta name="twitter:image" content="https://new.awesome.video/og-image.png" />
    <meta name="twitter:image:alt" content="Awesome Video — curated video development resources" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />

    <!-- DS no-FOUT boot script: lock to Editorial + Crimson before any module paints. -->
    <script>
      (function () {
        try {
          var root = document.documentElement;
          root.setAttribute('data-system', 'editorial');
          root.setAttribute('data-accent', 'crimson');
          root.classList.add('dark');
          root.style.backgroundColor = '#000';
          root.style.color = '#f4f3ee';
        } catch (e) {}
      })();
    </script>

    <!--
      Dev-only overlay suppressor.
      The @replit/vite-plugin-runtime-error-modal plugin forwards server-side
      Vite HMR WebSocket "Load failed" frames (frequent on mobile cellular)
      to every connected client, which renders Vite's full-screen
      <vite-error-overlay> and blocks the UI. The CSS rule in index.css
      hides the host element, but on mobile Safari the overlay sometimes
      ships its own inline style that still leaves a tap-blocker. This
      MutationObserver removes the host element entirely the moment it is
      inserted, and silences the offending unhandledrejection so the
      overlay loop does not re-fire. No-op in production builds.
    -->
    <script>
      (function () {
        try {
          var isDev = location.hostname.endsWith('.replit.dev') ||
                      location.hostname === 'localhost' ||
                      location.hostname.endsWith('.repl.co');
          if (!isDev) return;

          // Narrow regex: only match the specific Vite/HMR rejection
          // signatures that drive the overlay loop. Avoid bare "fetch" or
          // "vite" tokens so real app errors (incl. words like "invite"
          // or React Query fetch failures) still surface in dev consoles.
          var noisy = /(?:^|\b)(?:Load failed|Failed to fetch dynamically imported module|WebSocket (?:is closed|connection failed|error)|\[vite\]|vite-hmr|HMR connection lost)(?:\b|$)/i;
          var stackHit = /\/@vite\/client|\/node_modules\/vite\//;

          window.addEventListener('unhandledrejection', function (e) {
            var reason = e && e.reason;
            var msg = (reason && (reason.message || String(reason))) || '';
            var stack = (reason && reason.stack) || '';
            if (noisy.test(msg) || stackHit.test(stack)) e.preventDefault();
          });

          var kill = function (el) {
            try { el.parentNode && el.parentNode.removeChild(el); } catch (_) {}
          };
          var sweep = function () {
            document.querySelectorAll(
              'vite-error-overlay, vite-plugin-checker-error-overlay'
            ).forEach(kill);
          };

          if (document.body) sweep();
          new MutationObserver(function (muts) {
            for (var i = 0; i < muts.length; i++) {
              var added = muts[i].addedNodes;
              for (var j = 0; j < added.length; j++) {
                var n = added[j];
                if (n.nodeType === 1) {
                  var tag = n.tagName && n.tagName.toLowerCase();
                  if (tag === 'vite-error-overlay' ||
                      tag === 'vite-plugin-checker-error-overlay') {
                    kill(n);
                  }
                }
              }
            }
          }).observe(document.documentElement, { childList: true, subtree: true });
        } catch (e) {}
      })();
    </script>

    <!--
      Canonical font set — mirrors awesome-list-site handoff project/index.html
      line 10. We currently render Editorial+Crimson (Inter / Fraunces / JetBrains
      Mono), but the full per-system skin block is shipped in design-system.css,
      so the other system fonts are preloaded for any future data-system flip
      without an additional network round-trip.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
