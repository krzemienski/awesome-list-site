<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="description" content="A curated list of awesome resources from GitHub's Awesome list" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://awesome-list-site.example.com" />
    <meta property="og:title" content="Awesome List - A curated collection" />
    <meta property="og:description" content="A curated list of awesome resources, frameworks, libraries, and tools" />
    <meta property="og:image" content="https://opengraph.githubassets.com/1/sindresorhus/awesome" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Awesome List Static Site</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>" />

    <!-- DS no-FOUT boot script: pin data-system/data-accent before any module script paints. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('ds-system') || 'terminal';
          /* Option A locks to Terminal regardless of any legacy stored value. */
          s = 'terminal';
          var a = localStorage.getItem('ds-accent') || 'matrix';
          var root = document.documentElement;
          root.setAttribute('data-system', s);
          root.setAttribute('data-accent', a);
          root.classList.add('dark');
          root.style.backgroundColor = '#000';
          root.style.color = '#e8e8e0';
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
