services:
  # PostgreSQL database service
  postgres:
    image: postgres:16-alpine
    container_name: awesome-list-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: awesome_list
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: awesome-list-app
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/awesome_list
      # Required: express-session refuses to start without a secret.
      # Generate one with: openssl rand -base64 32
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me-in-production}
      # Optional but recommended: seeds/rotates the local admin account
      # (admin@example.com) on boot. Must be at least 8 characters.
      # Omit to skip admin creation.
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
